version: 2.1

jobs:
  backend-test:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-python-pip-{{ checksum "server/requirements.txt" }}

      - run:
          name: Install backend dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install --cache-dir ~/.cache/pip -r server/requirements.txt

      - save_cache:
          key: v1-python-pip-{{ checksum "server/requirements.txt" }}
          paths:
            - ~/.cache/pip

      - run:
          name: Run backend unit tests
          command: python -m unittest discover tests

      - run:
          name: Validate Alembic migrations
          command: |
            DATABASE_URL=sqlite:///server/ci_migration_check.db python -m alembic -c alembic.ini upgrade head
            rm -f server/ci_migration_check.db

  client-test-build:
    docker:
      - image: cimg/node:22.16
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Verify client workspace exists
          command: |
            test -f client/package.json
            test -f client/package-lock.json

      - restore_cache:
          keys:
            - v1-npm-{{ checksum "client/package-lock.json" }}

      - run:
          name: Install client dependencies
          working_directory: ~/project/client
          command: npm ci --cache ~/.npm --prefer-offline

      - save_cache:
          key: v1-npm-{{ checksum "client/package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: Lint client
          working_directory: ~/project/client
          command: npm run lint

      - run:
          name: Type-check client
          working_directory: ~/project/client
          command: npm run typecheck

      - run:
          name: Test client
          working_directory: ~/project/client
          command: npm run test

      - run:
          name: Build client
          working_directory: ~/project/client
          command: npm run build

workflows:
  test-and-build:
    jobs:
      - backend-test
      - client-test-build
