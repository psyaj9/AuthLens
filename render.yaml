services:
  - type: web
    name: authlens-backend
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic -c ../alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health/
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GOOGLE_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: PASSWORD_RESET_DELIVERY_MODE
        sync: false
      - key: PASSWORD_RESET_PUBLIC_BASE_URL
        sync: false
      - key: PASSWORD_RESET_SMTP_HOST
        sync: false
      - key: PASSWORD_RESET_SMTP_PORT
        value: "587"
      - key: PASSWORD_RESET_SMTP_USERNAME
        sync: false
      - key: PASSWORD_RESET_SMTP_PASSWORD
        sync: false
      - key: PASSWORD_RESET_EMAIL_FROM
        sync: false
      - key: PASSWORD_RESET_SMTP_USE_TLS
        value: "true"
      - key: PASSWORD_RESET_EXTERNAL_WEBHOOK_URL
        sync: false
      - key: PASSWORD_RESET_EXTERNAL_WEBHOOK_TOKEN
        sync: false
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: MAX_UPLOAD_FILES
        value: "5"
      - key: MAX_PDF_PAGES
        value: "25"
      - key: MAX_EXTRACTED_CHARS
        value: "200000"
      - key: MAX_DOCUMENT_CHUNKS
        value: "500"
      - key: AUTH_RATE_LIMIT_MAX_ATTEMPTS
        value: "5"
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: ENABLE_LEGACY_QA
        value: "false"
